<!DOCTYPE html>
<html>
<head>
<title>About - Elegance Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:#fff;
    color:#000;
}

nav{
    background:#000;
    padding:15px 50px;
    margin-left: 2px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav h1{
    color:#fff;
    letter-spacing:2px;
}

nav ul{
    list-style:none;
    display:flex;
}

nav ul li{
    margin-left:30px;
}

nav ul li a{
    color:#fff;
    text-decoration:none;
    transition:0.3s;
}

nav ul li a:hover{
    color:#ccc;
}


.section{
    padding:80px 100px;
}

.section h2{
    text-align:center;
    margin-bottom:30px;
    font-size:40px;
}

.section p{
    font-size:18px;
    line-height:30px;
    text-align:center;
    max-width:800px;
    margin:auto;
}

.images{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:50px;
}

.images img{
    width:100%;
    height:300px;
    object-fit:cover;
    border-radius:10px;
}


footer{
    background:#000;
    color:#fff;
    text-align:center;
    padding:20px;
    margin-left:2px;
}

@media screen and (min-width: 993px) {
    .box{
        width:30%;
        background:black;
    }
}

</style>
</head>
<body>


<nav>
    <h1>Elegance Hub</h1>
    <ul>
        
        <li><a href="about.html"></a></li>
        
</nav>

<div class="section">
<h2>About Elegance Hub</h2>

<p>
Elegance Hub Fashions is a premium online clothing shop providing 
modern, stylish and high quality outfits. Our mission is to bring 
confidence and elegance into your lifestyle.
</p>

<div class="images">
<img src="cloth 1.jpg">
<img src="cloth 12.webp">
<img src="cloth 4.webp">
<img src="cloth 2.jpg">

</div>

</div>

<footer>
 © 2026 Elegance Hub Fashions | All Rights Reserved
</footer>

</body>
</html>
