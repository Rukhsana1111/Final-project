<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elegance Hub Fashions</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:#fff;
}


nav{
    background:#000;
    padding:15px 50px;
    margin-left: 2px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition: 0.3s;
}

nav h1{
    color:#fff;
    letter-spacing:2px;
}

nav ul{
    list-style:none;
    display:flex;
}

nav ul li{
    margin-left:30px;
}

nav ul li a{
    color:#fff;
    text-decoration:none;
}
nav ul li a:hover{
   color: yellow;
}

.hero{
    height:100vh;
    background:url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d') no-repeat center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    position:relative;
    padding: 15px;
    margin-left: 2px;
}

.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.hero-content{
    position:relative;
    color:#fff;
}

.hero-content h2{
    font-size:45px;
    margin-bottom:20px;
    line-height:60px;
}


.hero-content a{
    display:inline-block;
    padding:12px 35px;
    background:#fff;
    color:#000;
    text-decoration:none;
    font-weight:bold;
    border-radius:5px;
    transition:0.3s;
}

.hero-content a:hover{
    background:yellow;
    color:#fff;
    border:1px solid #fff;
}

.heading {
  text-align: center;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr); 
    gap: 20px;
    width: 80%;
    margin: auto;
}

.card {
    border: 1px solid #ccc;
    padding: 10px;
    border-radius: 8px;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 5px;
}

.card p {
    margin-top: 10px;
    font-weight: bold;
}
.top-section{
    text-align:center;
    padding:80px 20px 40px;
}

.top-section h1{
    font-size:48px;
    margin-bottom:20px;
}

.top-section p{
    max-width:750px;
    margin:auto;
    font-size:20px;
    line-height:32px;
    color:#444;
}


.container{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:30px;
    padding:60px 100px;
}

.card{
    background:#fff;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.card-content{
    padding:20px;
    text-align:center;
}

.discount{
    color:#c0392b;
    font-weight:bold;
}

button{
    margin-top:12px;
    padding:10px 20px;
    background:#000;
    color:#fff;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#444;
}


footer{
    background:#000;
    color:#fff;
    text-align:center;
    padding:20px;
    margin-left: 2px;
}

@media screen and (min-width: 993px) {
    .box{
        width:30%;
        background:black;
    }
}

</style>
</head>
<body>

<nav>
    <h1>Elegance Hub</h1>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<section class="hero">
    <div class="hero-content">
        <h2>
            Welcome to <br>
            Elegance Hub Fashions <br>
            Clothes Online Shop
        </h2>

        <a href="shop.html">Shop Now</a>
    </div>
</section>
<h1 class="heading">Our Collection</h1>
<div id="gallery" class="gallery"></div>

<div id="main"></div>
<script src="javascript.js"></script>
<footer>
© 2026 Elegance Hub Fashions | All Rights Reserved
</footer>

</body>
</html>
