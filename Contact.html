<!DOCTYPE html>
<html>
<head>
<title>Contact - Elegance Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    background:#fff;
}


nav{
    background:#000;
    padding:15px 50px;
    margin-left: 2px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav h1{
    color:#fff;
    letter-spacing:2px;
}

nav ul{
    list-style:none;
    display:flex;
}

nav ul li{
    margin-left:30px;
}

nav ul li a{
    color:#fff;
    text-decoration:none;
    transition:0.3s;
}

nav ul li a:hover{
    color:#ccc;
}


.form-section{
    padding:80px;
    text-align:center;
}

.form-section h2{
    margin-bottom:30px;
}

input, textarea{
    width:60%;
    padding:15px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    background:#000;
    color:#fff;
    padding:12px 30px;
    border:none;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#333;
}


footer{
    background:#000;
    color:#fff;
    text-align:center;
    padding:20px;
    margin-left: 2px;
}

@media screen and (min-width: 993px) {
    .box{
        width:30%;
        background:black;
    }
}

</style>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

  <script>
    (function(){
      emailjs.init("zOH6w-YHCP7X8UQOr"); 
    })();
  </script>

</head>
<body>
<form id="contact-form"> ... </form>

<nav>
    <h1>Elegance Hub</h1>
    <ul>
        <li><a href="contact.html"></a></li>
    </ul>
</nav>

<div class="form-section">
<h2>Contact Us</h2>

<form>
<input type="text" placeholder="Your Name"><br>
<input type="email" placeholder="Your Email"><br>
<textarea rows="5" placeholder="Your Message"></textarea><br>
<button type="submit">Send Message</button>
</form>

</div>

<footer>
 © 2026 Elegance Hub Fashions | All Rights Reserved
</footer>
<script>
document.getElementById("contact-form").addEventListener("submit", function(event) {
  event.preventDefault();

  emailjs.sendForm("service_88i7get", "_ejs-test-mail-service", this)
    .then(function() {
      alert(" Successfully !");
    }, function(error) {
      alert("Error");
    });
});
</script>
</body>
</html>
